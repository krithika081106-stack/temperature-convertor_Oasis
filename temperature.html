<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Temperature Converter</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
    transition: all 0.4s ease;
}

/* Light Animated Background */
body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(-45deg, #fbc2eb, #a6c1ee, #fddb92, #d1fdff);
    background-size: 300% 300%;
    animation: gradientLight 8s ease infinite;
}

/* Dark Mode */
body.dark {
    background: linear-gradient(-45deg, #141e30, #243b55, #1f4037, #000428);
    background-size: 300% 300%;
    animation: gradientDark 8s ease infinite;
}

/* Animations */
@keyframes gradientLight {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

@keyframes gradientDark {
    0% { background-position: 100% 50%; }
    50% { background-position: 0% 50%; }
    100% { background-position: 100% 50%; }
}

/* Card */
.container {
    background: rgba(255, 255, 255, 0.25);
    backdrop-filter: blur(12px);
    padding: 30px;
    width: 320px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 8px 25px rgba(0,0,0,0.15);
}

/* Dark Card */
body.dark .container {
    background: rgba(0, 0, 0, 0.4);
    color: white;
}

/* Title */
h2 {
    margin-bottom: 20px;
    color: #444;
}

body.dark h2 {
    color: white;
}

/* Inputs */
input, select {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 12px;
    border: none;
    background: rgba(255,255,255,0.6);
}

body.dark input,
body.dark select {
    background: rgba(255,255,255,0.15);
    color: white;
}

/* Button */
button {
    width: 100%;
    padding: 12px;
    border-radius: 15px;
    border: none;
    background: linear-gradient(to right, #ff9a9e, #fad0c4);
    cursor: pointer;
}

/* Result + Toggle Row */
.result-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 15px;
}

/* Result Box */
#result {
    flex: 1;
    padding: 12px;
    border-radius: 12px;
    background: rgba(255,255,255,0.5);
    text-align: left;
}

/* Dark Result */
body.dark #result {
    background: rgba(255,255,255,0.15);
    color: white;
}

/* Toggle Button */
.toggle {
    margin-left: 10px;
    font-size: 20px;
    cursor: pointer;
}

/* Error */
.error {
    color: #ff4d6d;
}
</style>
</head>

<body>

<div class="container">
    <h2>🌸 Temperature Converter</h2>

    <input type="text" id="tempInput" placeholder="Enter temperature">

    <select id="unit">
        <option value="C">Celsius (°C)</option>
        <option value="F">Fahrenheit (°F)</option>
        <option value="K">Kelvin (K)</option>
    </select>

    <button onclick="convertTemp()">Convert</button>

    <!-- Result + Toggle -->
    <div class="result-row">
        <div id="result">Result will appear here</div>
        <div class="toggle" onclick="toggleMode()">🌙</div>
    </div>
</div>

<script>
function convertTemp() {
    let input = document.getElementById("tempInput").value;
    let unit = document.getElementById("unit").value;
    let result = document.getElementById("result");

    if (input === "" || isNaN(input)) {
        result.innerHTML = "Enter valid number!";
        result.className = "error";
        return;
    }

    result.className = "";

    let temp = parseFloat(input);
    let output = "";

    if (unit === "C") {
        let f = (temp * 9/5) + 32;
        let k = temp + 273.15;
        output = `${temp} °C → ${f.toFixed(2)} °F | ${k.toFixed(2)} K`;
    } 
    else if (unit === "F") {
        let c = (temp - 32) * 5/9;
        let k = c + 273.15;
        output = `${temp} °F → ${c.toFixed(2)} °C | ${k.toFixed(2)} K`;
    } 
    else {
        let c = temp - 273.15;
        let f = (c * 9/5) + 32;
        output = `${temp} K → ${c.toFixed(2)} °C | ${f.toFixed(2)} °F`;
    }

    result.innerHTML = output;
}

/* Toggle */
function toggleMode() {
    document.body.classList.toggle("dark");

    let icon = document.querySelector(".toggle");
    icon.innerHTML = document.body.classList.contains("dark") ? "☀️" : "🌙";
}
</script>

</body>
</html>
